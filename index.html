<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC 2026">
<title>🏆 WC 2026 · Knockout Tracker</title>
<style>
:root {
  --green:#1a6b3a;--green2:#228b4a;--green3:#0d4020;
  --gold:#c8922a;--gold2:#f0b84a;
  --dark:#0d1a12;--surface:#162213;--card:#1e2e1f;--card2:#263828;
  --border:#2e4232;--border2:#3a5040;
  --text:#e8f0e9;--muted:#8aaa8e;
  --red:#c0392b;--win:#27ae60;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--dark);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;font-size:15px;line-height:1.45;min-height:100vh;-webkit-font-smoothing:antialiased}

.header{background:linear-gradient(160deg,#0d2e17 0%,#1a5c35 50%,#0d2e17 100%);padding:env(safe-area-inset-top,16px) 16px 14px;text-align:center;border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100}
.hdr-trophy{font-size:26px}
.hdr-title{font-size:19px;font-weight:800;letter-spacing:.5px;color:#fff;margin-top:3px}
.hdr-sub{font-size:10px;color:var(--gold2);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.hdr-sync{font-size:10px;color:var(--muted);margin-top:4px;min-height:14px;transition:color .3s}
.hdr-sync.ok{color:#4cdd8a}
.hdr-sync.err{color:#f1948a}

.main-tabs{display:flex;background:var(--surface);border-bottom:2px solid var(--border)}
.main-tab{flex:1;padding:11px 4px;font-size:11px;font-weight:700;letter-spacing:.6px;text-align:center;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase;transition:.15s;user-select:none}
.main-tab.active{color:var(--gold2);border-bottom-color:var(--gold)}

.filter-bar{padding:9px 12px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fbtn{display:inline-block;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);color:var(--muted);font-size:12px;font-weight:600;margin-right:6px;background:transparent;cursor:pointer;transition:all .15s;user-select:none}
.fbtn.active{background:var(--green);border-color:var(--green);color:#fff}

.section{display:none}
.section.active{display:block}
.match-list{padding:8px 12px 100px}
.day-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin:14px 0 7px;padding-left:2px;display:flex;align-items:center;gap:8px}
.day-label::after{content:'';flex:1;height:1px;background:var(--border)}

.mc{background:var(--card);border-radius:var(--radius);margin-bottom:10px;border:1px solid var(--border);overflow:hidden;transition:border-color .15s}
.mc.completed{border-color:#2a4a2a}

.mc-head{padding:10px 14px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.mc-time{font-size:11px;font-weight:700;color:var(--gold2);background:rgba(200,146,42,.15);padding:3px 9px;border-radius:20px;white-space:nowrap}
.mc-venue{font-size:10px;color:var(--muted);text-align:right;max-width:58%;line-height:1.3}

.teams-row{display:flex;align-items:center;gap:4px;padding:2px 0}
.team-block{flex:1;padding:10px 12px;cursor:pointer;border-radius:var(--radius-sm);transition:background .12s;min-width:0}
.team-block:active{background:rgba(255,255,255,.06)}
.team-flag{font-size:24px;line-height:1;display:block}
.team-name{font-size:13px;font-weight:700;color:#fff;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-name.fav{color:var(--gold2)}
.team-player{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-right{text-align:right}
.vs{font-size:11px;font-weight:800;color:var(--border2);flex-shrink:0;letter-spacing:1px}

.fav-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid var(--border);background:rgba(0,0,0,.15)}
.fav-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.fav-val{font-size:11px;font-weight:700;color:var(--gold2)}
.tap-hint{font-size:10px;color:var(--muted)}

.result-strip{border-top:1px solid var(--border);background:#0f2018;padding:10px 14px}
.result-done{display:flex;align-items:center;justify-content:space-between}
.result-score{font-size:15px;font-weight:800;color:#fff;letter-spacing:.5px}
.result-winner{font-size:11px;font-weight:700;color:#4cdd8a;background:rgba(39,174,96,.18);padding:3px 10px;border-radius:20px}
.result-clear{font-size:10px;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid var(--border)}
.result-entry{display:flex;gap:8px;align-items:center}
.result-input{flex:1;background:var(--card2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;font-family:inherit;-webkit-appearance:none}
.result-input:focus{outline:none;border-color:var(--green2)}
.result-input::placeholder{color:var(--muted)}
.save-btn{background:var(--green);border:none;border-radius:var(--radius-sm);padding:8px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.save-btn:active{background:var(--green2)}

.winner-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.w-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;width:100%}
.wbtn{flex:1;padding:7px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;min-height:36px;transition:all .15s}
.wbtn.selected{background:var(--win);border-color:var(--win);color:#fff}

.g-drawer{display:none;background:#0f1f12;border-top:1px solid var(--border);padding:14px}
.g-drawer.open{display:block}
.g-team-hdr{font-size:13px;font-weight:800;color:var(--gold2);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.g-table{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:12px}
.g-table th{color:var(--muted);font-weight:600;font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;padding:0 4px 6px;text-align:left;border-bottom:1px solid var(--border)}
.g-table th:not(:first-child){text-align:center}
.g-table td{padding:6px 4px;border-bottom:1px solid rgba(46,66,50,.5);vertical-align:middle}
.g-table td:not(:first-child){text-align:center}
.g-table tr:last-child td{border-bottom:none}
.g-table .hl td{color:var(--gold2);font-weight:700}
.g-table .out td{color:var(--muted)}
.g-matches-ttl{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.g-match-row{font-size:11.5px;color:var(--text);padding:5px 0;border-bottom:1px solid rgba(46,66,50,.4);line-height:1.4;display:flex;align-items:center;gap:6px}
.g-match-row:last-child{border-bottom:none}
.rbadge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0}
.rw{background:rgba(39,174,96,.25);color:#4cdd8a}
.rd{background:rgba(41,128,185,.2);color:#7ec8e3}
.rl{background:rgba(192,57,43,.2);color:#f1948a}
.g-close{display:block;width:100%;padding:8px;background:var(--border);border:none;border-radius:var(--radius-sm);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;font-family:inherit}

.r16-wrap{padding:8px 12px 100px}
.r16-section{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.r16-section::after{content:'';flex:1;height:1px;background:var(--border)}
.r16-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;padding:13px 14px}
.r16-meta{font-size:10px;color:var(--muted);margin-bottom:10px;line-height:1.5}
.r16-meta strong{color:var(--gold2)}
.r16-mu{display:flex;align-items:center;gap:8px}
.r16-slot{flex:1;background:#0d1e10;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center;min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s}
.r16-slot.filled{border-color:var(--green2);background:#122018}
.r16-slot-flag{font-size:20px;display:block;margin-bottom:3px}
.r16-slot-name{font-size:11px;font-weight:700;color:#fff;line-height:1.2}
.r16-tbd{font-size:10px;color:var(--muted)}
.r16-vs{font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0}
.r16-note{font-size:10px;color:var(--muted);margin-top:8px;text-align:center;line-height:1.4}

/* ADMIN BANNER */
.admin-bar{background:#0a1f10;border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;justify-content:space-between}
.admin-label{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.admin-toggle{font-size:10px;color:var(--muted);cursor:pointer;background:var(--border);border:none;border-radius:6px;padding:4px 10px;font-family:inherit}

.footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 16px env(safe-area-inset-bottom,8px);font-size:10px;color:var(--muted);text-align:center;z-index:50}
</style>
</head>

// ─── SUPABASE API ────────────────────────────────────────────────────────────
async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {...opts, headers:{...HEADERS,...(opts.headers||{})}});
  if (!res.ok) throw new Error(await res.text());
  return res.status === 204 ? null : res.json();
}

async function loadResults() {
  try {
    const rows = await sbFetch('results?select=*');
    const map = {};
    rows.forEach(r => { map[r.match_id] = {score: r.score, winner: r.winner}; });
    return map;
  } catch(e) { return null; }
}

async function upsertResult(matchId, score, winner) {
  await sbFetch('results', {
    method: 'POST',
    headers: {'Prefer': 'resolution=merge-duplicates'},
    body: JSON.stringify({match_id: matchId, score: score || null, winner: winner || null})
  });
}

async function deleteResult(matchId) {
  await sbFetch('results?match_id=eq.' + matchId, {method: 'DELETE'});

  if (syncing) return;

    const fresh = await loadResults();

      setSyncStatus('✓ Live — synced ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}), 'ok');

// ─── TABS / FILTER ───────────────────────────────────────────────────────────
function showSection(id) {
  document.querySelectorAll('.main-tab').forEach((t,i)=>t.classList.toggle('active',['r32','r16'][i]===id));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('filterBar').style.display = id==='r32' ? '' : 'none';
  if(id==='r16') renderR16();
}

function filterDay(day, btn) {
  filter = day;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderR32();
}

// ─── DRAWER ──────────────────────────────────────────────────────────────────
function openDrawerFn(matchId, teamName) {
  const key = matchId+'|'+teamName;
  openDrawer = openDrawer === key ? null : key;
  renderR32();
  if(openDrawer) setTimeout(()=>{
    const el = document.getElementById('mc-'+matchId);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  }, 60);
}
function closeDrawer() { openDrawer = null; renderR32(); }

function drawerHTML(teamName) {
  const t = T[teamName]; if(!t) return '';
  const rows = t.standings.map(s=>{
    const hl = s.t === teamName;
    return `<tr class="${hl?'hl':(!s.adv?'out':'')}"><td>${s.adv?'✅':'❌'} ${s.t}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td><td>${s.gd>0?'+':''}${s.gd}</td><td><strong>${s.pts}</strong></td></tr>`;
  }).join('');
  const mrows = t.matches.map(m=>`
    <div class="g-match-row">
      <span class="rbadge ${m.r==='W'?'rw':m.r==='D'?'rd':'rl'}">${m.r}</span>
      ${m.d} · vs ${m.opp} — <strong>${m.s}</strong>
    </div>`).join('');
  return `<div class="g-team-hdr">${t.flag} ${teamName} · Group ${t.group}</div>
    <table class="g-table"><thead><tr><th>Team</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="g-matches-ttl">Group Stage Results</div>${mrows}
    <button class="g-close" onclick="closeDrawer()">✕ Close</button>`;
}

// ─── SAVE / CLEAR (admin only) ───────────────────────────────────────────────
async function saveResult(id) {
  const inp = document.getElementById('inp-'+id);
  if(!inp) return;
  const val = inp.value.trim();
  if(!val) return;
  setSyncStatus('Saving...', '');
  try {
    await upsertResult(id, val, results[id]?.winner || null);
    await syncFromDB();
  } catch(e) { setSyncStatus('⚠ Save failed', 'err'); }
}

async function selectWinner(matchId, teamName) {
  const cur = results[matchId]?.winner;
  const newWinner = cur === teamName ? null : teamName;
  setSyncStatus('Saving...', '');
  try {
    await upsertResult(matchId, results[matchId]?.score || null, newWinner);
    await syncFromDB();
  } catch(e) { setSyncStatus('⚠ Save failed', 'err'); }
}

async function clearResult(id) {
  setSyncStatus('Clearing...', '');
  try {
    await deleteResult(id);
    await syncFromDB();
  } catch(e) { setSyncStatus('⚠ Clear failed', 'err'); }
}

// ─── RENDER R32 ──────────────────────────────────────────────────────────────
function renderR32() {
  const filtered = MATCHES.filter(m => filter==='all' || m.day===filter);
  let html = ''; let lastDay = null;
  filtered.forEach(m => {
    if(m.dayLabel !== lastDay) { html += `<div class="day-label">${m.dayLabel}</div>`; lastDay = m.dayLabel; }
    const t1 = T[m.t1]||{}; const t2 = T[m.t2]||{};
    const res = results[m.id]||{};
    const hasScore = !!res.score;
    const winner = res.winner||null;
    const d1open = openDrawer === m.id+'|'+m.t1;
    const d2open = openDrawer === m.id+'|'+m.t2;
    const t1safe = m.t1.replace(/'/g,"\\'"); const t2safe = m.t2.replace(/'/g,"\\'");

    let resultHTML = '';
    if(hasScore) {
      resultHTML = `<div class="result-strip">
        <div class="result-done">
          <div>
            <div class="result-score">⚽ ${res.score}</div>
            ${winner?`<div class="result-winner">🏆 ${winner} advance</div>`:''}
          </div>
          ${isAdmin?`<button class="result-clear" onclick="clearResult('${m.id}')">✕ Clear</button>`:''}
        </div>
        ${isAdmin?`<div class="winner-row">
          <div class="w-lbl">Mark winner</div>
          <button class="wbtn${winner===m.t1?' selected':''}" onclick="selectWinner('${m.id}','${t1safe}')">${t1.flag||''} ${m.t1}</button>
          <button class="wbtn${winner===m.t2?' selected':''}" onclick="selectWinner('${m.id}','${t2safe}')">${t2.flag||''} ${m.t2}</button>
        </div>`:''}
      </div>`;
    } else {
      resultHTML = isAdmin ? `<div class="result-strip">
        <div class="result-entry">
          <input class="result-input" id="inp-${m.id}" type="text" placeholder="e.g. Canada 2–1 South Africa" onkeydown="if(event.key==='Enter')saveResult('${m.id}')">
          <button class="save-btn" onclick="saveResult('${m.id}')">Save</button>
        </div>
      </div>` : '';
    }

    html += `<div class="mc${hasScore?' completed':''}" id="mc-${m.id}">
      <div class="mc-head"><span class="mc-time">⏱ ${m.time}</span><span class="mc-venue">${m.venue}</span></div>
      <div class="teams-row">
        <div class="team-block" onclick="openDrawerFn('${m.id}','${t1safe}')">
          <span class="team-flag">${t1.flag||'🏳️'}</span>
          <div class="team-name${m.fav===m.t1?' fav':''}">${m.t1}${m.fav===m.t1?' ⭐':''}</div>
          <div class="team-player">👤 ${t1.keyPlayer||'—'}</div>
        </div>
        <div class="vs">VS</div>
        <div class="team-block team-right" onclick="openDrawerFn('${m.id}','${t2safe}')">
          <span class="team-flag">${t2.flag||'🏳️'}</span>
          <div class="team-name${m.fav===m.t2?' fav':''}">${m.fav===m.t2?'⭐ ':''}${m.t2}</div>
          <div class="team-player">${t2.keyPlayer||'—'} 👤</div>
        </div>
      </div>
      <div class="fav-row">
        <span class="fav-lbl">Favorite</span>
        <span class="fav-val">⭐ ${m.fav}</span>
        <span class="tap-hint">Tap name for group stats</span>
      </div>
      ${resultHTML}
      <div class="g-drawer${d1open?' open':''}">${d1open?drawerHTML(m.t1):''}</div>
      <div class="g-drawer${d2open?' open':''}">${d2open?drawerHTML(m.t2):''}</div>
    </div>`;
  });
  if(!filtered.length) html = '<div style="text-align:center;padding:40px 20px;color:var(--muted)">No matches this day.</div>';
  document.getElementById('matchList').innerHTML = html;
}

// ─── RENDER R16 ──────────────────────────────────────────────────────────────
function renderR16() {
  const halves = [
    {label:'Bracket A / B — Top Half', ids:['r16-a1','r16-b1','r16-a2','r16-b2']},
    {label:'Bracket C / D — Bottom Half', ids:['r16-c1','r16-d1','r16-c2','r16-d2']},
  ];
  let html = '';
  halves.forEach(h => {
    html += `<div class="r16-section">${h.label}</div>`;
    h.ids.forEach(rid => {
      const r = R16.find(x=>x.id===rid);
      const w0 = r.feeds[0] ? results[r.feeds[0]]?.winner : null;
      const w1 = r.feeds[1] ? results[r.feeds[1]]?.winner : null;
      const t0 = w0 ? T[w0] : null; const t1 = w1 ? T[w1] : null;
      html += `<div class="r16-card">
        <div class="r16-meta"><strong>${r.label}</strong> &nbsp;·&nbsp; ${r.date} &nbsp;·&nbsp; ${r.venue}</div>
        <div class="r16-mu">
          <div class="r16-slot${t0?' filled':''}">
            ${t0?`<span class="r16-slot-flag">${t0.flag}</span><div class="r16-slot-name">${w0}</div>`:'<span class="r16-tbd">TBD</span>'}
          </div>
          <div class="r16-vs">VS</div>
          <div class="r16-slot${t1?' filled':''}">
            ${t1?`<span class="r16-slot-flag">${t1.flag}</span><div class="r16-slot-name">${w1}</div>`:'<span class="r16-tbd">TBD</span>'}
          </div>
        </div>
        ${!t0&&!t1?'<div class="r16-note">Select R32 winners to populate this slot</div>':''}
      </div>`;
    });
  });
  document.getElementById('r16List').innerHTML = html;
}

renderR32();
renderR16();
</script>
</body>
</html>
